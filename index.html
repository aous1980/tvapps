<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Akkadian APK Store</title>
<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f172a;
  color:white;
}
header{
  padding:20px;
  text-align:center;
  background:#111827;
  font-size:22px;
  font-weight:bold;
}

#search{
  width:90%;
  padding:12px;
  margin:15px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:14px;
  margin:10px 0;
}

button{
  background:#22c55e;
  border:none;
  padding:8px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}

.note{
  text-align:center;
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}
</style>
</head>
<body>

<header>🚀 APK Store</header>

<div class="note">Only APK applications are supported</div>

<input type="text" id="search" placeholder="Search APK apps..." onkeyup="filterApps()" />

<div class="container" id="apps"></div>

<script>
let appsData = [];

fetch('apps.json')
.then(res => res.json())
.then(data => {
  // filter only APK links
  appsData = data.filter(app => app.url && app.url.toLowerCase().includes('.apk'));
  displayApps(appsData);
});

function displayApps(data){
  let container = document.getElementById('apps');
  container.innerHTML = '';

  data.forEach(app => {
    container.innerHTML += `
      <div class="card">
        <img src="${app.image}" />
        <h3>${app.name}</h3>
        <a href="${app.url}"><button>Download APK</button></a>
      </div>
    `;
  });
}

function filterApps(){
  let value = document.getElementById('search').value.toLowerCase();
  let filtered = appsData.filter(app =>
    app.name.toLowerCase().includes(value) && app.url.includes('.apk')
  );
  displayApps(filtered);
}
</script>

</body>
</html>
