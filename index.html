<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Akkadian Store</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  text-align: center;
}
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
.app {
  background: #1a1a1a;
  margin: 10px;
  padding: 15px;
  width: 200px;
  border-radius: 12px;
}
.app img {
  width: 100px;
}
.app a {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #00c853;
  color: white;
  text-decoration: none;
}
</style>

</head>

<body>

<h1>📺 Akkadian Apps Store</h1>

<div class="container" id="apps"></div>

<script>
fetch("apps.json")
.then(res => res.json())
.then(data => {
  let container = document.getElementById("apps");

  data.forEach(app => {
    container.innerHTML += `
      <div class="app">
        <img src="${app.image}">
        <h3>${app.name}</h3>
        <a href="${app.url}">تحميل</a>
      </div>
    `;
  });
});
</script>

</body>
</html>
